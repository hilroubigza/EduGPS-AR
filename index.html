<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>EduGPS Explore Pro: Smooth Radar & Anti-Drift</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@400;600;700&display=swap" rel="stylesheet">

    <style>
        body { font-family: 'Prompt', sans-serif; overflow: hidden; margin: 0; padding: 0; background-color: #000; touch-action: none; }
        
        #video-feed { position: fixed; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; z-index: 0; }
        
        @keyframes alert-pulse { 0% { box-shadow: inset 0 0 0 0 rgba(239, 68, 68, 0.4); } 70% { box-shadow: inset 0 0 0 20px rgba(239, 68, 68, 0); } 100% { box-shadow: inset 0 0 0 0 rgba(239, 68, 68, 0); } }
        .alert-screen { animation: alert-pulse 1s infinite; }
        
        .glass-panel { background: rgba(17, 24, 39, 0.75); backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .interactive-element { pointer-events: auto; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        
        .top-safe { top: max(10px, env(safe-area-inset-top)); }
        .bottom-safe { bottom: max(15px, env(safe-area-inset-bottom)); }
        
        .compass-arrow { display: inline-block; transition: transform 0.1s ease-out; font-size: 1.25rem; text-shadow: 0 2px 5px rgba(0,0,0,0.8); will-change: transform; }
        
        .card-container { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 200; justify-content: center; align-items: center; padding: 20px; background-color: rgba(0,0,0,0.6); backdrop-filter: blur(4px); }
        .card-container.active { display: flex; }
        .card { animation: cardPop 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        @keyframes cardPop { from { opacity: 0; transform: scale(0.8); } to { opacity: 1; transform: scale(1); } }
        
        .overlay-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 20px; text-align: center; color: white; background: rgba(17, 24, 39, 0.95); z-index: 150; }
    </style>
</head>
<body id="bodyContainer" class="flex flex-col h-screen w-screen">

    <div id="alertOverlay" class="fixed inset-0 pointer-events-none z-10"></div>

    <video id="video-feed" autoplay playsinline></video>

    <div id="startScreen" class="overlay-screen transition-opacity duration-500">
        <h1 class="text-4xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-green-400 to-blue-500 mb-2 drop-shadow-lg">
            EduGPS AR
        </h1>
        <p class="text-gray-300 text-sm mb-6 max-w-xs">ใช้เข็มทิศค้นหาสิ่งมีชีวิตปริศนารอบตัวคุณ</p>
        
        <div class="mb-8 w-full max-w-xs bg-gray-800/80 p-4 rounded-2xl border border-gray-700">
            <label class="block text-green-400 text-xs font-bold mb-2">ระยะการสุ่ม (เมตร)</label>
            <input type="number" id="radiusInput" value="10" min="5" max="500" class="w-full px-3 py-2 bg-gray-900 text-white rounded-lg border border-gray-600 text-center text-xl font-bold focus:outline-none focus:border-green-500">
            <p class="text-gray-400 text-[10px] mt-2">อิงจากพิกัดปัจจุบันของคุณ</p>
        </div>

        <button id="startGameBtn" class="px-10 py-4 bg-green-600 hover:bg-green-500 text-white font-bold rounded-full text-xl shadow-lg transform transition active:scale-95">
            เริ่มสแกนเรดาร์
        </button>
    </div>

    <div id="loading" class="overlay-screen hidden">
        <div class="w-16 h-16 border-4 border-gray-600 border-t-green-500 rounded-full animate-spin"></div>
        <p class="text-sm mt-4 text-gray-300" id="loadingText">กำลังปรับเทียบสัญญาณ...</p>
    </div>

    <div id="gameHeader" class="fixed top-safe left-3 right-3 z-20 hidden pointer-events-none">
        <div class="glass-panel rounded-2xl p-3 flex justify-between items-center shadow-lg pointer-events-auto">
            <div>
                <h1 class="text-sm font-extrabold text-blue-400 leading-none">EduGPS Radar</h1>
                <p class="text-gray-300 text-[10px] mt-1">
                    พบแล้ว <span id="speciesFoundCount" class="text-green-400 font-bold text-xs">0</span>/<span id="totalSpeciesCount" class="font-bold text-xs">0</span>
                </p>
            </div>
            <div id="nearestDistContainer" class="bg-gray-800/80 px-3 py-1.5 rounded-xl border border-gray-600 text-right">
                <p class="text-[9px] text-gray-400 leading-none mb-0.5">ใกล้สุด</p>
                <div class="text-white font-black leading-none">
                    <span id="nearestDistText" class="text-xl">--</span><span class="text-[10px]">ม.</span>
                </div>
            </div>
        </div>
    </div>

    <div id="mainContent" class="fixed bottom-safe left-3 right-3 z-20 hidden pointer-events-none">
        <div class="glass-panel rounded-3xl p-3 shadow-2xl flex flex-col pointer-events-auto border border-gray-600/50">
            <div class="flex justify-between items-center mb-2 px-1">
                <span class="text-[10px] font-bold text-green-400 flex items-center gap-1.5">
                    <span class="w-1.5 h-1.5 bg-green-500 rounded-full animate-ping"></span>เป้าหมายรอบตัว
                </span>
                <span class="text-[9px] text-gray-400" id="gpsAccuracyText">รอสัญญาณ GPS...</span>
            </div>
            
            <div id="radarListContainer" class="space-y-2 overflow-y-auto no-scrollbar max-h-[35vh]">
                </div>
        </div>
    </div>

    <div id="foundCardContainer" class="card-container">
        <div class="card bg-gray-900 border border-green-500/50 p-5 rounded-3xl shadow-2xl w-full max-w-sm flex flex-col gap-3 relative overflow-hidden">
            <div class="absolute top-0 left-0 w-full h-1 bg-gradient-to-r from-green-400 to-blue-500"></div>
            
            <h2 class="text-2xl font-black text-green-400 text-center">ค้นพบแล้ว!</h2>
            
            <div class="aspect-square bg-black/50 rounded-2xl overflow-hidden flex justify-center items-center border border-gray-700">
                <img id="foundCardImage" src="" class="w-full h-full object-contain hidden">
                <span id="noFoundCardImage" class="text-gray-600 text-lg font-bold">ไม่มีรูปภาพ</span>
            </div>
            
            <div class="bg-gray-800/80 p-3 rounded-xl border border-gray-700">
                <p class="text-gray-400 text-[10px]">สิ่งมีชีวิตปริศนาคือ:</p>
                <h3 id="foundCardName" class="text-xl font-bold text-white">???</h3>
                <p id="foundCardPoints" class="text-xs font-bold text-green-400 mt-1">คะแนน: +0</p>
            </div>
            
            <p class="text-gray-300 text-xs bg-gray-800/50 p-2.5 rounded-lg border border-gray-700/50">
                <span id="foundCardDescription" class="line-clamp-3 leading-relaxed">...</span>
            </p>
            
            <button id="closeCardBtn" class="bg-green-600 text-white py-3 rounded-xl font-bold text-sm hover:bg-green-500 transition mt-1">
                บันทึกลงสมุด
            </button>
        </div>
    </div>

    <script>
        // ==========================================
        // 1. ตัวแปรระบบ
        // ==========================================
        const SHEET_ID = "1HcMpOQZUFJQVFm0m1CJyb9clQFBoSWL7sL6PmP4DdGM"; 
        
        let speciesData = [];    
        let configCenter = { lat: 0, lon: 0, radius: 10 }; 
        let foundSpeciesIds = new Set(); 
        let isGameStarted = false;
        
        // ตัวแปรสำหรับระบบกันสั่น (GPS Smoothing)
        let smoothedLat = null;
        let smoothedLon = null;
        let playerCurrentLat = null;
        let playerCurrentLon = null;
        let phoneHeading = 0; 

        // ==========================================
        // 2. ดึงข้อมูล
        // ==========================================
        async function fetchGoogleSheetJSON(sheetName) {
            const url = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&sheet=${sheetName}`;
            const res = await fetch(url);
            const text = await res.text();
            const jsonString = text.match(/google\.visualization\.Query\.setResponse\(([\s\S\w]+)\);/)[1];
            return JSON.parse(jsonString);
        }

        // ==========================================
        // 3. เริ่มเกมส์ และระบบเซ็นเซอร์เข็มทิศ
        // ==========================================
        document.getElementById('startGameBtn').addEventListener('click', () => {
            let customRadius = parseFloat(document.getElementById('radiusInput').value);
            configCenter.radius = (isNaN(customRadius) || customRadius < 5) ? 10 : customRadius;

            initCompass(); 

            document.getElementById('startScreen').style.opacity = '0';
            setTimeout(() => { document.getElementById('startScreen').style.display = 'none'; }, 500);
            document.getElementById('loading').classList.remove('hidden');
            
            startARCamera();
            
            if ("geolocation" in navigator) {
                navigator.geolocation.getCurrentPosition(onCurrentPositionSuccess, handleGPSError, { enableHighAccuracy: true });
            } else {
                alert("GPS ไม่รองรับ");
            }
        });

        function initCompass() {
            if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
                DeviceOrientationEvent.requestPermission()
                    .then(permissionState => {
                        if (permissionState === 'granted') window.addEventListener('deviceorientation', handleOrientation);
                    }).catch(console.error);
            } else {
                window.addEventListener('deviceorientationabsolute', handleOrientation);
                window.addEventListener('deviceorientation', handleOrientation);
            }
        }

        function handleOrientation(event) {
            let heading = null;
            if (event.webkitCompassHeading) heading = event.webkitCompassHeading;
            else if (event.alpha !== null) heading = Math.abs(event.alpha - 360);
            
            if (heading !== null) {
                phoneHeading = heading;
                updateArrowsOnly(); 
            }
        }

        async function onCurrentPositionSuccess(position) {
            configCenter.lat = position.coords.latitude;
            configCenter.lon = position.coords.longitude;
            smoothedLat = configCenter.lat; // ตั้งค่าเริ่มต้นให้ระบบกันสั่น
            smoothedLon = configCenter.lon;
            playerCurrentLat = smoothedLat;
            playerCurrentLon = smoothedLon;
            
            try {
                const speciesRaw = await fetchGoogleSheetJSON('Species');
                let rawList = [];
                speciesRaw.table.rows.forEach(row => {
                    const c = row.c;
                    if (c && c[0] && c[0].v) rawList.push({ name: c[0].v, description: c[1]?.v||"", points: c[2]?.v||0, hint: c[3]?.v||"", imageUrl: c[4]?.v||"" });
                });

                const earthRadius = 6371000;
                speciesData = rawList.map((item, index) => {
                    const newLat = configCenter.lat + (Math.random() * 2 - 1) * (configCenter.radius / earthRadius) * (180 / Math.PI);
                    const newLon = configCenter.lon + (Math.random() * 2 - 1) * (configCenter.radius / earthRadius) * (180 / Math.PI) / Math.cos(configCenter.lat * Math.PI / 180);
                    return { ...item, lat: newLat, lon: newLon, id: index, distance: 999, bearing: 0 };
                });

                document.getElementById('totalSpeciesCount').innerText = speciesData.length;
                document.getElementById('loading').classList.add('hidden');
                document.getElementById('gameHeader').classList.remove('hidden');
                document.getElementById('mainContent').classList.remove('hidden');
                
                isGameStarted = true;
                startGPSWatch(); 
            } catch (error) {
                document.getElementById('loadingText').innerText = "ข้อผิดพลาด: " + error.message;
            }
        }

        function startARCamera() {
            const video = document.getElementById('video-feed');
            if (navigator.mediaDevices && navigator.mediaDevices.getUserMedia) {
                navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' }, audio: false })
                    .then(stream => { video.srcObject = stream; video.play(); })
                    .catch(e => console.log("Camera err"));
            }
        }

        // ==========================================
        // 4. Algorithm Optimization & ระบบกันสั่น GPS
        // ==========================================
        function startGPSWatch() {
            navigator.geolocation.watchPosition(
                (pos) => {
                    // 🔥 ระบบกันสั่น 1: ถ้าระยะความคลาดเคลื่อน (accuracy) แย่กว่า 30 เมตร ให้ข้ามไปเลย ไม่เอามาคำนวณ
                    if (pos.coords.accuracy > 30 && smoothedLat !== null) return;

                    const rawLat = pos.coords.latitude;
                    const rawLon = pos.coords.longitude;

                    // 🔥 ระบบกันสั่น 2: EMA Smoothing (ผสมค่าใหม่ 30% ค่าเก่า 70% เพื่อลดอาการเด้งไปมา)
                    if (smoothedLat === null) {
                        smoothedLat = rawLat;
                        smoothedLon = rawLon;
                    } else {
                        const smoothingWeight = 0.3; // เปลี่ยนแปลงนุ่มนวลขึ้น
                        smoothedLat = (rawLat * smoothingWeight) + (smoothedLat * (1 - smoothingWeight));
                        smoothedLon = (rawLon * smoothingWeight) + (smoothedLon * (1 - smoothingWeight));
                    }

                    playerCurrentLat = smoothedLat;
                    playerCurrentLon = smoothedLon;

                    if(pos.coords.accuracy) {
                        document.getElementById('gpsAccuracyText').innerText = `ความแม่นยำ: ±${Math.round(pos.coords.accuracy)}ม. (กันสั่น: ON)`;
                    }
                    
                    calculateGPSData(); 
                    renderRadarList();  
                }, 
                handleGPSError,
                { enableHighAccuracy: true, maximumAge: 1000, timeout: 5000 }
            );
        }

        function calculateGPSData() {
            if (!isGameStarted || !playerCurrentLat) return;
            
            speciesData.forEach((species) => {
                species.distance = getDistance(playerCurrentLat, playerCurrentLon, species.lat, species.lon);
                species.bearing = getBearing(playerCurrentLat, playerCurrentLon, species.lat, species.lon);
            });
            
            speciesData.sort((a, b) => a.distance - b.distance);
        }

        function renderRadarList() {
            const container = document.getElementById('radarListContainer');
            container.innerHTML = ""; 
            
            let activeCount = 0;
            let nearestDist = Infinity;

            speciesData.forEach((target) => {
                if (foundSpeciesIds.has(target.id)) return;
                activeCount++;
                
                if (target.distance < nearestDist) nearestDist = target.distance;

                // 💥 แจ้งเตือนเมื่อเจอ (ระยะ <= 1 เมตร) *แนะนำให้ปรับเป็น <= 2 ถ้านักเรียนหาไม่เจอจริงๆ
                if (target.distance <= 2) {
                    showFoundCard(target);
                    return; 
                }

                const roundedDist = Math.round(target.distance);
                
                let borderCol = "border-gray-700/50";
                let textCol = "text-white";
                if (target.distance <= 3) { borderCol = "border-red-500/50 bg-red-900/20"; textCol = "text-red-300"; }
                else if (target.distance <= 8) { borderCol = "border-yellow-500/50 bg-yellow-900/20"; textCol = "text-yellow-300"; }

                const itemHtml = `
                    <div class="flex justify-between items-center bg-gray-800/80 border ${borderCol} rounded-xl p-2.5 backdrop-blur-sm">
                        <div class="text-left flex-grow pr-2">
                            <div class="flex items-center gap-1.5">
                                <span class="text-xs font-bold ${textCol}">สิ่งมีชีวิตปริศนา ❓</span>
                            </div>
                            <p class="text-[9px] text-gray-400 mt-0.5 truncate max-w-[150px]">คำใบ้: ${target.hint || '-'}</p>
                        </div>
                        
                        <div class="flex items-center gap-2">
                            <div id="arrow-${target.id}" class="compass-arrow" data-bearing="${target.bearing}">⬆️</div>
                            <div class="bg-gray-900 text-gray-200 font-bold px-2 py-1 rounded-lg text-right w-12 border border-gray-700">
                                ${roundedDist} <span class="text-[8px] font-normal">ม.</span>
                            </div>
                        </div>
                    </div>
                `;
                container.insertAdjacentHTML('beforeend', itemHtml);
            });

            const distUI = document.getElementById('nearestDistText');
            const alertBox = document.getElementById('alertOverlay');
            
            if (activeCount > 0) {
                distUI.innerText = Math.round(nearestDist);
                if (nearestDist <= 3) alertBox.classList.add('alert-screen');
                else alertBox.classList.remove('alert-screen');
            } else {
                distUI.innerText = "--";
                alertBox.classList.remove('alert-screen');
                if (foundSpeciesIds.size === speciesData.length) {
                    container.innerHTML = `<div class="text-center py-4 text-green-400 font-bold text-xs">🎉 ยอดเยี่ยม! พบเป้าหมายครบแล้ว</div>`;
                }
            }
            
            updateArrowsOnly();
        }

        function updateArrowsOnly() {
            const arrows = document.querySelectorAll('.compass-arrow');
            arrows.forEach(arrow => {
                const targetBearing = parseFloat(arrow.getAttribute('data-bearing'));
                const rotation = targetBearing - phoneHeading;
                arrow.style.transform = `rotate(${rotation}deg)`;
            });
        }

        function getDistance(lat1, lon1, lat2, lon2) {
            const R = 6371e3;
            const φ1 = lat1 * Math.PI/180, φ2 = lat2 * Math.PI/180;
            const Δφ = (lat2-lat1) * Math.PI/180, Δλ = (lon2-lon1) * Math.PI/180;
            const a = Math.sin(Δφ/2) * Math.sin(Δφ/2) + Math.cos(φ1) * Math.cos(φ2) * Math.sin(Δλ/2) * Math.sin(Δλ/2);
            return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a)); 
        }

        function getBearing(lat1, lon1, lat2, lon2) {
            const toRad = Math.PI / 180, toDeg = 180 / Math.PI;
            const dLon = (lon2 - lon1) * toRad;
            const y = Math.sin(dLon) * Math.cos(lat2 * toRad);
            const x = Math.cos(lat1 * toRad) * Math.sin(lat2 * toRad) - Math.sin(lat1 * toRad) * Math.cos(lat2 * toRad) * Math.cos(dLon);
            return ((Math.atan2(y, x) * toDeg) + 360) % 360; 
        }

        function handleGPSError(e) {
            if (!isGameStarted) {
                document.getElementById('loading').classList.add('hidden');
                alert("ระบบต้องการ GPS กรุณาเปิดระบบระบุตำแหน่ง");
                document.getElementById('startScreen').style.opacity = '1';
                document.getElementById('startScreen').style.display = 'flex';
            }
        }

        // ==========================================
        // 5. ป๊อปอัพแสดงผล
        // ==========================================
        function showFoundCard(species) {
            if (foundSpeciesIds.has(species.id)) return; 
            foundSpeciesIds.add(species.id);
            
            document.getElementById('speciesFoundCount').innerText = foundSpeciesIds.size; 
            document.getElementById('foundCardName').innerText = species.name;
            document.getElementById('foundCardDescription').innerText = species.description;
            document.getElementById('foundCardPoints').innerText = `คะแนน: +${species.points}`;
            
            const img = document.getElementById('foundCardImage');
            const noImg = document.getElementById('noFoundCardImage');
            if (species.imageUrl) { img.src = species.imageUrl; img.classList.remove('hidden'); noImg.classList.add('hidden'); }
            else { img.classList.add('hidden'); noImg.classList.remove('hidden'); }
            
            document.getElementById('foundCardContainer').classList.add('active'); 
            document.getElementById('mainContent').style.display = 'none';
            document.getElementById('gameHeader').style.display = 'none';
            document.getElementById('alertOverlay').classList.remove('alert-screen');
            
            if (navigator.vibrate) navigator.vibrate([200, 100, 200, 100, 400]); 
        }

        document.getElementById('closeCardBtn').addEventListener('click', () => {
            document.getElementById('foundCardContainer').classList.remove('active'); 
            document.getElementById('mainContent').style.display = 'flex'; 
            document.getElementById('gameHeader').style.display = 'flex'; 
            renderRadarList(); 
        });
    </script>
</body>
</html>
